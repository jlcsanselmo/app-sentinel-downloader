<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu WebGIS - Sentinel Downloader</title>
    <link href="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="painel-controlo">
    <h3>1. Área de Interesse</h3>
    <input type="file" id="upload-shapefile" accept=".zip">

    <div id="busca-imagens" style="display: none; margin-top: 15px; border-top: 1px solid #ccc; padding-top: 15px;">
        <h3>2. Escolher Data</h3>
        <input type="date" id="data-imagem" style="width: 100%; margin-bottom: 10px;">
        <button id="btn-buscar" style="width: 100%; padding: 8px; cursor: pointer;">Buscar Imagens do Sentinel-2</button>
        
        <div id="resultados-busca" style="margin-top: 15px;"></div>
    </div>
</div>
</div>

    <div id="map"></div>

    <script src="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.js"></script>
    <script src="app.js"></script>
</body>
</html>
