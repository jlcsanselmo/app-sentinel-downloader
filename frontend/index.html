<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP Sentinel-2 Downloader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark shadow" style="position: relative; z-index: 3;">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">APP Sentinel-2 Downloader</span>
        </div>
    </nav>

    <div style="position: relative; height: calc(100vh - 56px); width: 100%;">

        <div id="map" style="position: absolute; top: 0; bottom: 0; width: 100%;"></div>

        <div class="bg-white shadow-lg p-4 overflow-auto rounded-4" 
             style="position: absolute; top: 20px; left: 20px; width: 400px; max-height: calc(100vh - 96px); z-index: 2;">
            
            <div class="mb-4">
                <label class="form-label fw-bold">1. Área de Interesse (Shapefile .zip)</label>
                <input class="form-control" type="file" id="upload-shapefile" accept=".zip">
            </div>

            <div id="busca-imagens" class="mb-4" style="display: none;">
                <label class="form-label fw-bold">2. Escolher Data de Referência</label>
                <input type="date" class="form-control mb-2" id="data-imagem">
                <button id="btn-buscar" class="btn btn-primary w-100">🔍 Buscar Imagens do Sentinel-2</button>
            </div>

            <div id="progress-container" class="mt-4 d-none p-3 border rounded bg-light">
                <p id="progress-text" class="mb-2 fw-bold text-primary small">A iniciar processamento...</p>
                <div class="progress" style="height: 20px;">
                    <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%;">0%</div>
                </div>
            </div>

            <div id="resultados-busca" class="mt-4"></div>
        </div>

    </div>

    <script src="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.js"></script>
    <script src="app.js"></script>
</body>
</html>
